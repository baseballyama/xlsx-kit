name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on the same ref so a fast-forward push doesn't
# spend minutes on stale CI.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Cheap, single-version gate. Catches typing / lint / format violations
  # before spinning up the test matrix.
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm build
      # Bundle-size gate: xlsx-kit/streaming ≤80KB, full lib ≤120KB
      # (docs/plan/06-streaming.md §3.4 acceptance).
      - run: pnpm size

  # Multi-version test matrix. Active LTS lines + Current. Node 18 / 20 are
  # past EOL and intentionally dropped.
  test:
    needs: static
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22', '24', '26']
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      # ECMA-376 conformance tests shell out to xmllint (libxml2-utils).
      # ubuntu-latest usually ships it, but install explicitly so the gate
      # never silently degrades to "no schema validation ran".
      - run: sudo apt-get update && sudo apt-get install -y libxml2-utils
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
